<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Access Denied — dbadeeds.ai</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    body { font-family:'IBM Plex Sans',sans-serif; background:#f8fafc; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
    .box { text-align:center; max-width:420px; padding:40px; background:#fff; border:1px solid #e2e8f0; border-radius:14px; box-shadow:0 4px 20px rgba(0,0,0,.07); }
    .icon { font-size:52px; margin-bottom:16px; }
    h1 { font-family:'IBM Plex Mono',monospace; font-size:18px; font-weight:600; color:#0f172a; margin-bottom:8px; }
    p  { font-size:13px; color:#64748b; line-height:1.6; margin-bottom:20px; }
    code { background:#f1f5f9; padding:2px 6px; border-radius:4px; font-size:12px; }
    a { display:inline-block; padding:10px 24px; background:#3b82f6; color:white; border-radius:8px; text-decoration:none; font-size:13px; font-weight:600; }
    a:hover { background:#2563eb; }
  </style>
</head>
<body>
<div class="box">
  <div class="icon">🔒</div>
  <h1>Access Denied</h1>
  <p>You don't have the <code>{{ permission }}</code> permission required to view this page.<br/>Contact your administrator to request access.</p>
  <a href="/dashboard">← Back to Dashboard</a>
</div>
</body>
</html>
