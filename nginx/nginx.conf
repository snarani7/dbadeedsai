##############################################################################
# nginx.conf — Production reverse proxy for dbadeeds.ai
#
# Role (same as Apache Tomcat connector / Tomcat's own HTTP connector):
#   - Terminates SSL/TLS
#   - Serves static files directly (no Python involved)
#   - Proxies all other traffic to Gunicorn (Flask)
#   - Buffers SSE / streaming responses correctly
#   - Rate limiting at the edge
##############################################################################

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 4096;
    use                epoll;
    multi_accept       on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" $request_time';
    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         text/plain text/css application/json application/javascript text/xml;
    gzip_min_length    1000;
    server_tokens      off;   # Don't reveal Nginx version

    # ── Rate limiting zones ───────────────────────────────────────────────────
    limit_req_zone  $binary_remote_addr zone=login:10m rate=10r/m;
    limit_req_zone  $binary_remote_addr zone=api:10m   rate=60r/m;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ── Upstream (Gunicorn workers) ───────────────────────────────────────────
    upstream flask_app {
        server app:5000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── Main HTTPS server ──────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name dbadeeds.ai www.dbadeeds.ai;   # ← change to your domain

        # SSL certificates (place in nginx/ssl/)
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Security headers ──────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options           SAMEORIGIN                            always;
        add_header X-Content-Type-Options    nosniff                               always;
        add_header Referrer-Policy           strict-origin-when-cross-origin       always;

        client_max_body_size 20m;

        # ── Static files — served by Nginx, NOT Python ────────────────────────
        location /static/ {
            alias  /app/static/;
            expires 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
        }

        # ── Login rate limit ──────────────────────────────────────────────────
        location /api/auth/login {
            limit_req zone=login burst=5 nodelay;
            proxy_pass http://flask_app;
            include /etc/nginx/proxy_params;
        }

        # ── SSE streaming (AI chat) — disable proxy buffering ────────────────
        location /api/ai/chat/stream {
            proxy_pass          http://flask_app;
            proxy_http_version  1.1;
            proxy_set_header    Connection "";
            proxy_buffering     off;          # Critical for SSE
            proxy_cache         off;
            proxy_read_timeout  300s;         # Long timeout for LLM streams
            chunked_transfer_encoding on;
            include /etc/nginx/proxy_params;
        }

        # ── All other API routes ──────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://flask_app;
            include /etc/nginx/proxy_params;
        }

        # ── Web UI (all HTML pages) ───────────────────────────────────────────
        location / {
            proxy_pass http://flask_app;
            include /etc/nginx/proxy_params;
        }
    }
}
